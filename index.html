<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>کامپایلر هوشمند پارس | ویرایشگر HTML</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #0a1a2a, #020617);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Vazirmatn', 'Segoe UI', sans-serif;
        }
        .glass-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(20, 30, 45, 0.45);
            backdrop-filter: blur(14px);
            border-radius: 56px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 24px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            background: linear-gradient(135deg, #ffd966, #ffaa44);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.9rem;
        }
        .header p {
            color: #cbd5e6;
            font-size: 0.85rem;
        }
        .editor-area {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            border-radius: 36px;
            padding: 18px;
            border: 1px solid #ffd96666;
            margin-bottom: 20px;
        }
        .editor-header {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffefb0;
            font-weight: bold;
            margin-bottom: 12px;
            padding-right: 8px;
        }
        textarea {
            width: 100%;
            height: 320px;
            background: #0a0f1f;
            color: #e2e8f0;
            border: 1px solid #ffd966aa;
            border-radius: 28px;
            padding: 18px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            direction: ltr;
            text-align: left;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin-bottom: 25px;
        }
        .btn {
            background: linear-gradient(135deg, #ffaa44, #ff8800);
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-outline {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            color: #ffefb0;
            border: 1px solid #ffd966;
        }
        .preview-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 32px;
            padding: 12px;
            border: 1px solid #ffd966aa;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 18px;
            color: #ffefb0;
            font-weight: bold;
        }
        iframe {
            width: 100%;
            height: 420px;
            background: white;
            border-radius: 24px;
            border: none;
        }
        .status {
            text-align: center;
            margin-top: 16px;
            font-size: 0.75rem;
            color: #a3e6a3;
        }
        @media (max-width: 650px) {
            textarea { height: 240px; }
            iframe { height: 320px; }
            .btn { padding: 6px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="glass-wrapper">
    <div class="header">
        <h1><i class="bi bi-code-slash"></i> کامپایلر هوشمند پارس</h1>
        <p>HTML زنده | بنویس، پیش‌نمایش کن، دانلود کن، ذخیره کن</p>
    </div>

    <div class="editor-area">
        <div class="editor-header">
            <i class="bi bi-filetype-html fs-5"></i> کد HTML خود را بنویسید
        </div>
        <textarea id="htmlCode" placeholder="کد HTML خود را اینجا بنویسید...">&lt;!DOCTYPE html&gt;
&lt;html lang="fa" dir="rtl"&gt;
&lt;head&gt;
    &lt;meta charset="UTF-8"&gt;
    &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;
    &lt;title&gt;کامپایلر پارس&lt;/title&gt;
    &lt;style&gt;
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Vazirmatn', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            border: 1px solid white;
        }
        h1 { color: #2e7d32; }
        button {
            background: #ffaa44;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
    &lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
    &lt;div class="card"&gt;
        &lt;h1&gt;✨ کامپایلر هوشمند پارس ✨&lt;/h1&gt;
        &lt;p&gt;کد HTML خود را بنویس و نتیجه را ببین&lt;/p&gt;
        &lt;button onclick="alert('سلام! کد شما اجرا شد!')"&gt;کلیک کن&lt;/button&gt;
    &lt;/div&gt;
&lt;/body&gt;
&lt;/html&gt;</textarea>
    </div>

    <div class="button-group">
        <button class="btn" id="runBtn"><i class="bi bi-play-fill"></i> پیش‌نمایش</button>
        <button class="btn btn-outline" id="saveBtn"><i class="bi bi-save"></i> ذخیره در مرورگر</button>
        <button class="btn btn-outline" id="downloadBtn"><i class="bi bi-download"></i> دانلود HTML</button>
        <button class="btn btn-outline" id="resetBtn"><i class="bi bi-arrow-repeat"></i> بازیابی نمونه</button>
    </div>

    <div class="preview-box">
        <div class="preview-header">
            <span><i class="bi bi-eye"></i> خروجی زنده</span>
            <span style="font-size:0.7rem;">(کاملاً تعاملی)</span>
        </div>
        <iframe id="previewFrame" title="html preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    </div>
    <div class="status" id="statusMsg">✨ آماده | کد خود را بنویس و پیش‌نمایش را ببین ✨</div>
</div>

<script>
    const htmlEditor = document.getElementById('htmlCode');
    const previewFrame = document.getElementById('previewFrame');
    const runBtn = document.getElementById('runBtn');
    const saveBtn = document.getElementById('saveBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusMsg = document.getElementById('statusMsg');

    const STORAGE_KEY = 'pars_html_compiler';

    // نمونه کد پیش‌فرض زیبا
    const defaultHTML = `<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کامپایلر پارس</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Vazirmatn', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .glass-card {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            max-width: 500px;
        }
        h1 {
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        p {
            color: #f0f0f0;
            margin: 15px 0;
        }
        button {
            background: #ffaa44;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.02);
            background: #ff8800;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>✨ کامپایلر هوشمند پارس ✨</h1>
        <p>کد HTML خود را بنویسید و نتیجه را در لحظه ببینید</p>
        <button onclick="alert('سلام! 🎉 کامپایلر پارس آماده است')">کلیک کن</button>
    </div>
</body>
</html>`;

    // تابع به روزرسانی iframe
    function runPreview() {
        const code = htmlEditor.value;
        const blob = new Blob([code], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        previewFrame.src = url;
        setTimeout(() => URL.revokeObjectURL(url), 500);
        statusMsg.innerHTML = '✅ پیش‌نمایش به‌روز شد';
        setTimeout(() => {
            if (statusMsg.innerHTML === '✅ پیش‌نمایش به‌روز شد')
                statusMsg.innerHTML = '✨ آماده | کد خود را بنویس و پیش‌نمایش را ببین ✨';
        }, 2000);
    }

    // ذخیره در localStorage
    function saveCode() {
        localStorage.setItem(STORAGE_KEY, htmlEditor.value);
        statusMsg.innerHTML = '💾 کد در مرورگر ذخیره شد';
        setTimeout(() => {
            if (statusMsg.innerHTML === '💾 کد در مرورگر ذخیره شد')
                statusMsg.innerHTML = '✨ آماده | کد خود را بنویس و پیش‌نمایش را ببین ✨';
        }, 2000);
    }

    // بارگذاری از localStorage
    function loadSavedCode() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            htmlEditor.value = saved;
            statusMsg.innerHTML = '📂 آخرین کد ذخیره شده بازیابی شد';
            runPreview();
        } else {
            htmlEditor.value = defaultHTML;
            statusMsg.innerHTML = '✨ کد نمونه بارگذاری شد ✨';
            runPreview();
        }
        setTimeout(() => {
            if (statusMsg.innerHTML === '📂 آخرین کد ذخیره شده بازیابی شد' || statusMsg.innerHTML === '✨ کد نمونه بارگذاری شد ✨')
                statusMsg.innerHTML = '✨ آماده | کد خود را بنویس و پیش‌نمایش را ببین ✨';
        }, 2500);
    }

    // ریست به نمونه پیش‌فرض
    function resetToSample() {
        htmlEditor.value = defaultHTML;
        runPreview();
        statusMsg.innerHTML = '🔄 کد به حالت نمونه بازنشانی شد (ذخیره نشد)';
        setTimeout(() => {
            if (statusMsg.innerHTML === '🔄 کد به حالت نمونه بازنشانی شد (ذخیره نشد)')
                statusMsg.innerHTML = '✨ برای ذخیره دائم از دکمه ذخیره استفاده کن ✨';
        }, 2000);
    }

    // دانلود فایل HTML
    function downloadHTML() {
        const code = htmlEditor.value;
        const blob = new Blob([code], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `pars_compiler_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        statusMsg.innerHTML = '📥 فایل HTML دانلود شد';
        setTimeout(() => {
            if (statusMsg.innerHTML === '📥 فایل HTML دانلود شد')
                statusMsg.innerHTML = '✨ آماده | کد خود را بنویس و پیش‌نمایش را ببین ✨';
        }, 2000);
    }

    // رویدادها
    runBtn.addEventListener('click', runPreview);
    saveBtn.addEventListener('click', saveCode);
    downloadBtn.addEventListener('click', downloadHTML);
    resetBtn.addEventListener('click', resetToSample);

    // بارگذاری اولیه
    loadSavedCode();

    // ذخیره خودکار هر ۳۰ ثانیه (اختیاری)
    setInterval(() => {
        if (htmlEditor.value) {
            localStorage.setItem(STORAGE_KEY, htmlEditor.value);
        }
    }, 30000);
</script>
</body>
</html>
